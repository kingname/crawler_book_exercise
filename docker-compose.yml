services:
  exercise:
    build: .
    image: exercise-kingname-info:latest
    container_name: exercise-kingname-info
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me-in-env-file}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/').read()\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
