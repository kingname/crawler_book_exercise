server {
    listen 80;
    listen [::]:80;
    server_name exercise.kingname.info;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name exercise.kingname.info;

    ssl_certificate     /home/kingname/.acme.sh/kingname.info_ecc/fullchain.cer;
    ssl_certificate_key /home/kingname/.acme.sh/kingname.info_ecc/kingname.info.key;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 8m;

    # 全部请求反向代理到 Docker 容器（容器内部含 index.html、templates/、static/）
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    access_log /var/log/nginx/exercise.kingname.info.access.log;
    error_log  /var/log/nginx/exercise.kingname.info.error.log;
}
