server {
    listen 80;
    listen [::]:80;
    server_name exercise.kingname.info;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name exercise.kingname.info;

    ssl_certificate     /home/kingname/.acme.sh/kingname.info_ecc/fullchain.cer;
    ssl_certificate_key /home/kingname/.acme.sh/kingname.info_ecc/kingname.info.key;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 首页（静态）直接由 nginx 提供
    location = / {
        root /home/kingname/exercise;
        try_files /index.html =404;
    }

    # /static/ 下的文件（验证码图片、二维码等）由 nginx 直接提供
    location /static/ {
        alias /home/kingname/exercise/static/;
        expires 1h;
    }

    # 其他所有请求反向代理到 Flask
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    access_log /var/log/nginx/exercise.kingname.info.access.log;
    error_log  /var/log/nginx/exercise.kingname.info.error.log;
}
