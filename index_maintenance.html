<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>练习网站暂时下线 — Python爬虫开发，从入门到实战</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #0f1117;
      min-height: 100vh;
    }

    .grid-bg {
      background-image:
        linear-gradient(rgba(99, 102, 241, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.07) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .glow-ring {
      box-shadow:
        0 0 0 1px rgba(99, 102, 241, 0.3),
        0 0 40px rgba(99, 102, 241, 0.15),
        0 0 80px rgba(99, 102, 241, 0.08);
    }

    .code-tag {
      font-family: 'Courier New', monospace;
    }

    .shimmer {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.06) 50%,
        rgba(255,255,255,0) 100%
      );
      background-size: 200% 100%;
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .pulse-dot {
      animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .book-title {
      font-family: 'Noto Serif SC', serif;
    }

    .divider-line {
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
    }
  </style>
</head>
<body class="grid-bg text-gray-100">

  <!-- 顶部状态栏 -->
  <div class="border-b border-white/5 bg-white/3 backdrop-blur-sm">

        <span class="text-indigo-400">&gt;_</span>
        <span>python-spider-exercise</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="pulse-dot w-2 h-2 rounded-full bg-yellow-400 inline-block"></span>

    </div>
  </div>

  <!-- 主体内容 -->

          <path stroke-linecap="round" stroke-linejoin="round"

        <svg class="w-3 h-3 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />

        配套练习网站
      </span>
    </div>
    <h1 class="book-title text-2xl sm:text-3xl font-bold text-white mb-2 leading-snug">
      《Python爬虫开发，从入门到实战》
    </h1>

    <!-- 分割线 -->

        <svg class="w-5 h-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

    <!-- 微信联系区域 -->

      </p>

      <!-- 二维码卡片 -->

        <img
          src="IMG_8105.JPG"

            <path d="M8.867 4.667c-2.4 0-4.4 1.6-4.4 3.6 0 1.2.667 2.267 1.733 2.933l-.533 1.6 1.733-.933c.467.133.933.2 1.467.2 2.4 0 4.4-1.6 4.4-3.6s-2-3.8-4.4-3.8zm-1.4 4.533c-.333 0-.6-.267-.6-.6s.267-.6.6-.6.6.267.6.6-.267.6-.6.6zm2.8 0c-.333 0-.6-.267-.6-.6s.267-.6.6-.6.6.267.6.6-.267.6-.6.6zM15.867 9.333c-1.867 0-3.4 1.267-3.4 2.8 0 1.533 1.533 2.8 3.4 2.8.4 0 .8-.067 1.133-.2l1.333.733-.4-1.2c.8-.533 1.333-1.333 1.333-2.133 0-1.533-1.533-2.8-3.4-2.8zm-1.133 3.467c-.267 0-.467-.2-.467-.467s.2-.467.467-.467.467.2.467.467-.2.467-.467.467zm2.267 0c-.267 0-.467-.2-.467-.467s.2-.467.467-.467.467.2.467.467-.2.467-.467.467z"/>

    </div>

  </main>

  <!-- 底部 -->
  <footer class="border-t border-white/5 mt-10">
    <div class="max-w-4xl mx-auto px-6 py-5 flex items-center justify-center">
      <p class="text-xs text-gray-600 code-tag">
        © 青南 &nbsp;·&nbsp; 《Python爬虫开发，从入门到实战》配套练习网站

</body>
