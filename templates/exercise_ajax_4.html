<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AJAX 练习 4 —— 基于异步加载的简单登录</title>
  <style>
    body { font-family: -apple-system, 'PingFang SC', sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; color: #222; line-height: 1.8; }
    .box { background: #fff; border: 1px solid #e6e8ef; padding: 28px 32px; border-radius: 8px; }
    label { display: block; margin: 10px 0 4px; color: #374151; font-size: 14px; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    button { margin-top: 18px; background: #6366f1; color: #fff; border: 0; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .hint { font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="box">
    <h1>AJAX 登录练习</h1>
    <p class="hint">用户名：kingname，密码：genius。点击登录后，页面会通过 Ajax 向 <code>/ajax_4_backend</code> 发送 POST 请求。</p>

    <label>用户名</label>
    <input type="text" id="u" placeholder="用户名：kingname">
    <label>密码</label>
    <input type="password" id="p" placeholder="密码：genius">
    <button onclick="doLogin()">登录</button>
  </div>

  <script>
    function doLogin() {
      fetch('/ajax_4_backend', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: document.getElementById('u').value,
          password: document.getElementById('p').value
        })
      }).then(r => r.json()).then(d => {
        alert(d.code);
      });
    }
  </script>
</body>
</html>
