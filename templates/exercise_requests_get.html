  <h1>使用GET方式获取网页源代码</h1>
  <p>你好，世界！这里是一个简单的 GET 练习页。请使用 Python 的 requests 库的 get 方法访问这个页面，获取网页的源代码，再使用正则表达式把标题和下面两段文字提取出来。</p>
  <p>既然你能看到这段文字，说明你已经掌握了使用 GET 方式访问网页的第一步。下一步就是熟练运用正则表达式，从网页源代码中提取你真正需要的数据。加油，爬虫的世界才刚刚向你打开大门。</p>
