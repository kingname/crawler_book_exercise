<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>请求头 Headers 练习</title>
  <style>
    body { font-family: -apple-system, 'PingFang SC', sans-serif; max-width: 720px; margin: 30px auto; padding: 0 20px; color: #222; line-height: 1.8; }
    .content { background: #f5f5fa; border-left: 3px solid #6366f1; padding: 14px 18px; margin: 14px 0; border-radius: 3px; min-height: 24px; }
    .hint { font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <h1>请求头伪造练习</h1>
  <p class="hint">
    这个页面会通过 Ajax 去 <code>/exercise_headers_backend</code> 获取数据，请求头中会带上一个秘密暗号。
    仔细观察浏览器开发者工具里的请求头（包括 User-Agent、Referer、X-Requested-With 以及自定义的 anhao），
    然后用 Python 还原这些请求头，让爬虫顺利拿到返回内容。
  </p>

  <div class="content">加载中……</div>

  <script>
    fetch('/exercise_headers_backend', {
      method: 'GET',
      headers: {
        'anhao': 'kingname',
        'X-Requested-With': 'XMLHttpRequest'
      }
    }).then(r => r.json()).then(d => {
      document.querySelector('.content').innerText = d.code;
    });
  </script>
</body>
</html>
