<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>模拟登录练习</title>
  <style>
    body { font-family: -apple-system, 'PingFang SC', sans-serif; max-width: 440px; margin: 60px auto; padding: 0 20px; color: #222; line-height: 1.8; }
    .box { background: #fff; border: 1px solid #e6e8ef; padding: 28px 32px; border-radius: 8px; }
    label { display: block; margin: 10px 0 4px; color: #374151; font-size: 14px; }
    input[type=text], input[type=password] { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    .remember { margin-top: 12px; font-size: 14px; }
    button.login { margin-top: 18px; background: #6366f1; color: #fff; border: 0; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .err { color: #dc2626; font-size: 13px; margin-top: 8px; }
    .hint { font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="box">
    <h1>模拟登录练习</h1>
    <p class="hint">用户名：kingname，密码：genius。这是一个典型的表单登录，登录成功后会通过 302 跳转到成功页面。</p>
    <form method="POST" action="/exercise_login">
      <label>用户名</label>
      <input type="text" name="username" placeholder="请输入用户名">
      <label>密码</label>
      <input type="password" name="password" placeholder="请输入密码">
      <div class="remember">
        <label><input type="checkbox" name="rememberme" value="Yes"> 自动登录</label>
      </div>
      <button class="login" type="submit">登录</button>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
    </form>
  </div>
</body>
</html>
