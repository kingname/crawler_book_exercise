<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>重试中间件练习页</title>
  <style>
    body { font-family: -apple-system, 'PingFang SC', sans-serif; max-width: 760px; margin: 30px auto; padding: 0 20px; color: #222; line-height: 1.8; }
    .pager { margin: 18px 0; }
    .pager a { padding: 6px 10px; border: 1px solid #d1d5db; margin-right: 6px; border-radius: 3px; text-decoration: none; color: #374151; font-size: 14px; }
    .pager a.cur { background: #6366f1; color: #fff; border-color: #6366f1; }
    .content { background: #f5f5fa; border-left: 3px solid #6366f1; padding: 14px 18px; margin: 14px 0; border-radius: 3px; min-height: 24px; }
    .hint { font-size: 13px; color: #6b7280; }
    input[type=number] { width: 60px; padding: 5px 8px; }
    button { background: #6366f1; color: #fff; border: 0; padding: 6px 12px; border-radius: 3px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>重试中间件练习</h1>
  <p class="hint">
    请使用爬虫获取第 1 到第 9 页的内容。翻页通过向 <code>/exercise_middleware_retry_backend/param/&lt;页数&gt;</code>
    发送 POST 请求获取，body 是 JSON，需要提供一个 <code>date</code> 字段。如果 date 错了，服务端会返回「参数错误」；
    把路径中的 <code>param</code> 改为 <code>404</code>，服务端会在 date 错误时跳转到 <code>/404.html</code>。
  </p>

  <div class="pager">
    {% for i in range(1, total + 1) %}
      <a href="/exercise_middleware_retry.html?page={{ i }}" class="{% if i == page %}cur{% endif %}">{{ i }}</a>
    {% endfor %}
    <span style="margin-left: 14px;">跳转到
      <input type="number" id="jumpPage" min="1" max="{{ total }}" value="{{ page }}">
      <button onclick="jump()">Go</button>
    </span>
  </div>

  <div class="content" id="content">加载第 {{ page }} 页……</div>

  <script>
    const page = {{ page }};
    const today = "{{ today }}";

    fetch('/exercise_middleware_retry_backend/param/' + page, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({date: today})
    }).then(r => r.text()).then(t => {
      document.getElementById('content').innerText = t;
    });

    function jump() {
      const p = document.getElementById('jumpPage').value;
      window.location = '/exercise_middleware_retry.html?page=' + p;
    }
  </script>
</body>
</html>
